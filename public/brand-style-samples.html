<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Style Preview — All 40 Styles</title>
  <style>
    :root {
      --page-bg: #f4f0e8;
      --page-ink: #172230;
      --page-muted: #5f6b79;
      --page-accent: #0f766e;
      --page-panel: rgba(255, 255, 255, 0.72);
      --page-border: rgba(23, 34, 48, 0.1);
      --page-shadow: 0 24px 70px rgba(27, 38, 49, 0.12);
      --display-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --body-font: "Aptos", "Segoe UI Variable Text", "Trebuchet MS", sans-serif;
      --mono-font: "Consolas", "SFMono-Regular", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--body-font);
      color: var(--page-ink);
      background:
        radial-gradient(circle at top left, rgba(68, 149, 196, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(245, 201, 109, 0.18), transparent 30%),
        linear-gradient(180deg, #fbf7f2 0%, #f4f0e8 46%, #efe8dd 100%);
      padding: 32px 20px 64px;
    }

    .page { max-width: 1440px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      background: var(--page-panel);
      border: 1px solid var(--page-border);
      box-shadow: var(--page-shadow);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 28px 32px;
      margin-bottom: 28px;
    }
    .header .eyebrow {
      font-family: var(--mono-font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--page-accent);
      margin-bottom: 10px;
    }
    .header h1 {
      margin: 0;
      font-family: var(--display-font);
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.06;
      letter-spacing: -0.04em;
    }
    .header p {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--page-muted);
      max-width: 80ch;
    }
    .header .counts {
      margin-top: 14px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header .count-pill {
      font-family: var(--mono-font);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(23, 34, 48, 0.1);
      color: var(--page-muted);
    }

    /* ── Group label ── */
    .group-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono-font);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--page-muted);
      margin-bottom: 14px;
    }
    .group-label::after {
      content: "";
      display: inline-block;
      width: 80px;
      height: 1px;
      background: var(--page-border);
    }

    /* ── Card grid ── */
    .style-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .style-card {
      background: var(--page-panel);
      border: 1px solid var(--page-border);
      box-shadow: var(--page-shadow);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .card-head h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.025em;
    }
    .card-badge {
      font-family: var(--mono-font);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(23, 34, 48, 0.06);
      border: 1px solid rgba(23, 34, 48, 0.08);
      white-space: nowrap;
      color: var(--page-muted);
    }

    .slide-frame {
      padding: 8px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(247,244,239,0.82));
      border: 1px solid rgba(23,34,48,0.08);
    }

    .card-key {
      font-family: var(--mono-font);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--page-muted);
    }

    /* ── Slide canvas ── */
    .slide {
      position: relative;
      aspect-ratio: 16 / 9;
      width: 100%;
      overflow: hidden;
      border-radius: 14px;
      background: var(--slide-bg, #ffffff);
      color: var(--slide-text, #172230);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      isolation: isolate;
    }
    .slide.theme-dark {
      --slide-text: #f4f7fb;
      --slide-muted: rgba(233, 240, 248, 0.84);
      --slide-border: rgba(233, 240, 248, 0.16);
    }
    .slide.theme-light {
      --slide-text: #172230;
      --slide-muted: rgba(23, 34, 48, 0.72);
      --slide-border: rgba(23, 34, 48, 0.12);
    }

    /* ── Slide decorations ── */
    .slide-deco { position: absolute; pointer-events: none; }

    .slide-backdrop-blob {
      inset: auto auto -12% -6%;
      width: 38%; height: 46%;
      border-radius: 52% 48% 62% 38% / 40% 56% 44% 60%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), rgba(255,255,255,0.02));
      filter: blur(10px);
      opacity: 0.78;
      z-index: 0;
    }

    .slide-grid {
      inset: 0;
      background-image:
        linear-gradient(var(--slide-grid-color, transparent) 1px, transparent 1px),
        linear-gradient(90deg, var(--slide-grid-color, transparent) 1px, transparent 1px);
      background-size: 6.8% 10.2%;
      opacity: 0.45;
      z-index: 0;
    }

    .slide-rings {
      right: 5%; top: 10%;
      width: 16%; aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.42);
      opacity: 0.5;
      z-index: 0;
    }
    .slide-rings::before, .slide-rings::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }
    .slide-rings::before { inset: 14%; border: 2px solid rgba(255,255,255,0.36); }
    .slide-rings::after  { inset: 30%; border: 2px solid rgba(255,255,255,0.36); }

    .slide-frame-outline {
      inset: 2.4%;
      border: 1px solid rgba(255,255,255,0.28);
      z-index: 0;
    }
    .slide-frame-outline.double {
      border-width: 2px;
      box-shadow: inset 0 0 0 4px transparent, inset 0 0 0 5px rgba(255,255,255,0.18);
    }

    .slide-rainbow {
      left: 0; right: 0; height: 10px;
      background: linear-gradient(90deg, #ff2f92, #ffca55, #58f8b0, #61b8ff, #b07dff);
      z-index: 0;
    }
    .slide-rainbow.top    { top: 0; }
    .slide-rainbow.bottom { bottom: 0; }

    .sparkle {
      width: 16px; height: 16px;
      background: currentColor;
      clip-path: polygon(50% 0%, 61% 35%, 100% 50%, 61% 65%, 50% 100%, 39% 65%, 0% 50%, 39% 35%);
      opacity: 0.6;
      z-index: 0;
    }

    .slide-scanlines {
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px);
      z-index: 5;
      pointer-events: none;
    }

    .corner-bracket {
      position: absolute;
      width: 5%; height: 6.67%;
      z-index: 2;
      pointer-events: none;
    }
    .corner-bracket.tl { top: 3.5%; left: 3%; border-top: 2px solid var(--slide-accent); border-left: 2px solid var(--slide-accent); }
    .corner-bracket.tr { top: 3.5%; right: 3%; border-top: 2px solid var(--slide-accent); border-right: 2px solid var(--slide-accent); }
    .corner-bracket.bl { bottom: 4%; left: 3%; border-bottom: 2px solid var(--slide-accent); border-left: 2px solid var(--slide-accent); }
    .corner-bracket.br { bottom: 4%; right: 3%; border-bottom: 2px solid var(--slide-accent); border-right: 2px solid var(--slide-accent); }

    .decorative-circle {
      position: absolute;
      width: 9%; aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--slide-accent);
      opacity: 0.32;
      pointer-events: none;
      z-index: 1;
      bottom: 8%; right: 5%;
    }

    .top-left-block {
      position: absolute;
      width: 1.25%;
      aspect-ratio: 1;
      z-index: 2;
      border-radius: 1px;
      pointer-events: none;
    }

    /* ── Slide content slots ── */
    .s-title {
      position: absolute;
      z-index: 1;
      font-family: var(--display-font);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.08;
      color: var(--slide-title, var(--slide-text));
    }
    .s-desc {
      position: absolute;
      z-index: 1;
      font-size: 10px;
      line-height: 1.5;
      color: var(--slide-muted);
    }

    /* ── Panels ── */
    .panel {
      position: absolute;
      z-index: 1;
      border-radius: var(--panel-radius, 18px);
      background: var(--panel-fill, rgba(255,255,255,0.12));
      border: 1px solid var(--panel-border, var(--slide-border));
      box-shadow: var(--panel-shadow, none);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.has-stripe {
      border-left: 4px solid var(--slide-accent, #3b82f6);
    }

    .panel-inner {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .panel-header {
      font-family: var(--mono-font);
      font-size: 8px;
      line-height: 1.3;
      letter-spacing: 0.06em;
      color: var(--slide-muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .mini-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
    }
    .mini-list li {
      font-size: 9px;
      line-height: 1.3;
      color: var(--slide-text);
      padding-left: 12px;
      position: relative;
    }
    .mini-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.42em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--item-accent, var(--slide-accent, #3b82f6));
    }

    /* ── Accent decorations inside slide ── */
    .accent-bar {
      position: absolute;
      z-index: 1;
      background: var(--slide-accent, #3b82f6);
      border-radius: 999px;
    }
    .accent-rule {
      position: absolute;
      z-index: 1;
      height: 3px;
      background: linear-gradient(90deg, var(--slide-accent, #3b82f6), var(--slide-accent-2, #8ae0b2));
      opacity: 0.92;
      border-radius: 999px;
    }
    .key-band {
      position: absolute;
      z-index: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
    }

    .notes-line {
      position: absolute;
      z-index: 1;
      font-family: var(--mono-font);
      font-size: 7px;
      color: var(--slide-muted);
      opacity: 0.5;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (max-width: 520px) {
      body { padding-inline: 12px; }
      .style-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="eyebrow">Brand Style Preview</div>
      <h1>All 40 Design Styles</h1>
      <p>Each style from <code style="font-family:var(--mono-font);font-size:12px">style_config.py</code> rendered with its exact visual profile — background, panel fill, borders, shadows, and decorative elements.</p>
      <div class="counts">
        <span class="count-pill">2 Foundation</span>
        <span class="count-pill">31 Named Styles</span>
        <span class="count-pill">7 Template Motifs</span>
      </div>
    </div>

    <div><span class="group-label">Foundation</span></div>
    <div id="foundationGrid" class="style-grid"></div>

    <div><span class="group-label">Named Styles</span></div>
    <div id="namedGrid" class="style-grid"></div>

    <div><span class="group-label">Template Motifs</span></div>
    <div id="motifsGrid" class="style-grid"></div>
  </div>

  <script>
    const SW = 13.33;
    const SH = 7.5;
    function pctX(v) { return `${(v / SW) * 100}%`; }
    function pctY(v) { return `${(v / SH) * 100}%`; }

    function hexToRgb(hex) {
      const c = hex.replace("#", "");
      const n = c.length === 3 ? c.split("").map(x => x + x).join("") : c;
      return { r: parseInt(n.slice(0, 2), 16), g: parseInt(n.slice(2, 4), 16), b: parseInt(n.slice(4, 6), 16) };
    }
    function rgba(hex, a) { const c = hexToRgb(hex); return `rgba(${c.r},${c.g},${c.b},${a})`; }
    function mix(a, b, r) {
      const ca = hexToRgb(a), cb = hexToRgb(b);
      const bl = (l, ri) => Math.round(l * (1 - r) + ri * r);
      const ch = v => v.toString(16).padStart(2, "0");
      return `#${ch(bl(ca.r, cb.r))}${ch(bl(ca.g, cb.g))}${ch(bl(ca.b, cb.b))}`;
    }
    function gradientBg(colors) {
      return colors.length === 1 ? colors[0] : `linear-gradient(135deg, ${colors.join(", ")})`;
    }

    // Layout rects — panels take most of the vertical space
    const L = {
      title:  { x: 0.6, y: 0.35, w: 11.0, h: 0.48 },
      desc:   { x: 0.6, y: 0.90, w: 11.0, h: 0.38 },
      left:   { x: 0.6, y: 1.40, w: 5.8,  h: 4.6  },
      right:  { x: 6.7, y: 1.40, w: 5.8,  h: 4.6  },
      notes:  { x: 0.6, y: 6.25, w: 11.5, h: 0.35 },
    };

    function setRect(el, r) {
      el.style.left   = pctX(r.x);
      el.style.top    = pctY(r.y);
      el.style.width  = pctX(r.w);
      el.style.height = pctY(r.h);
    }

    // ── Decorations ──
    function addDecorations(slide, sd) {
      if (sd.blob) {
        const el = document.createElement("div");
        el.className = "slide-deco slide-backdrop-blob";
        slide.appendChild(el);
      }
      if (sd.grid) {
        const el = document.createElement("div");
        el.className = "slide-deco slide-grid";
        el.style.setProperty("--slide-grid-color", rgba(sd.accent, sd.tone === "dark" ? 0.16 : 0.12));
        slide.appendChild(el);
      }
      if (sd.rings) {
        const el = document.createElement("div");
        el.className = "slide-deco slide-rings";
        slide.appendChild(el);
      }
      if (sd.frame) {
        const el = document.createElement("div");
        el.className = `slide-deco slide-frame-outline${sd.frame === "double" ? " double" : ""}`;
        slide.appendChild(el);
      }
      if (sd.rainbow) {
        const t = document.createElement("div"); t.className = "slide-deco slide-rainbow top"; slide.appendChild(t);
        const b = document.createElement("div"); b.className = "slide-deco slide-rainbow bottom"; slide.appendChild(b);
      }
      if (sd.sparkle) {
        [[12,15],[80,18],[14,78],[82,75]].forEach(([l,t]) => {
          const sp = document.createElement("div");
          sp.className = "slide-deco sparkle";
          sp.style.left = `${l}%`; sp.style.top = `${t}%`;
          sp.style.color = sd.accent;
          slide.appendChild(sp);
        });
      }
      if (sd.scanLines) {
        const el = document.createElement("div");
        el.className = "slide-deco slide-scanlines";
        slide.appendChild(el);
      }
      if (sd.cornerBrackets) {
        ["tl","tr","bl","br"].forEach(pos => {
          const el = document.createElement("div");
          el.className = `corner-bracket ${pos}`;
          slide.appendChild(el);
        });
      }
      if (sd.decorativeCircle) {
        const el = document.createElement("div");
        el.className = "decorative-circle";
        slide.appendChild(el);
      }
      if (sd.topLeftBlocks) {
        [0, 1].forEach((idx) => {
          const el = document.createElement("div");
          el.className = "top-left-block";
          el.style.left = `${3.8 + idx * 1.05}%`;
          el.style.top = `5.8%`;
          el.style.background = sd.topLeftBlockColors?.[idx]
            || (idx === 0 ? sd.accent : (sd.topLeftBlocksAccent || sd.accent2 || sd.accent));
          slide.appendChild(el);
        });
      }
    }

    // ── Panel helpers ──
    function getPanelFill(sd, idx) {
      const alt = idx % 2 === 0 ? sd.accent2 : sd.accent;
      if (sd.panelFill === "transparent") return rgba(sd.bg[0], sd.tone === "dark" ? 0.06 : 0.04);
      if (sd.panelFill === "solid") return rgba(mix(sd.bg[0], alt, 0.22), sd.panelOpacity);
      return rgba(mix(sd.bg[0], alt, sd.tone === "dark" ? 0.28 : 0.16), sd.panelOpacity);
    }
    function getPanelShadow(sd) {
      if (sd.shadow === "hard") return "6px 6px 0 rgba(17,17,17,0.8)";
      if (sd.shadow === "accent") return `0 14px 24px ${rgba(sd.accent, 0.22)}`;
      return sd.tone === "dark" ? "0 14px 28px rgba(0,0,0,0.22)" : "0 14px 28px rgba(23,34,48,0.1)";
    }

    function makePanel(slide, rect, sd, header, items, idx) {
      const panel = document.createElement("div");
      panel.className = `panel${sd.stripe ? " has-stripe" : ""}`;
      setRect(panel, rect);
      const borderColor = sd.panelBorderPalette?.[idx % sd.panelBorderPalette.length]
        ?? (sd.tone === "dark" ? "#FFFFFF" : sd.accent2);
      panel.style.setProperty("--panel-radius", `${sd.panelRadius || 18}px`);
      panel.style.setProperty("--panel-fill", getPanelFill(sd, idx));
      panel.style.setProperty("--panel-border", sd.panelBorder
        ? rgba(borderColor, sd.tone === "dark" ? 0.68 : 0.14)
        : "transparent");
      panel.style.setProperty("--panel-shadow", getPanelShadow(sd));

      const inner = document.createElement("div");
      inner.className = "panel-inner";
      if (sd.bodyFont) inner.style.fontFamily = sd.bodyFont;

      const h = document.createElement("div");
      h.className = "panel-header";
      h.textContent = header;
      inner.appendChild(h);

      const list = document.createElement("ul");
      list.className = "mini-list";
      items.forEach((text, itemIndex) => {
        const li = document.createElement("li");
        li.textContent = text;
        const itemAccent = sd.itemAccentPalette?.[itemIndex % sd.itemAccentPalette.length];
        if (itemAccent) li.style.setProperty("--item-accent", itemAccent);
        list.appendChild(li);
      });
      inner.appendChild(list);

      panel.appendChild(inner);
      slide.appendChild(panel);
    }

    // ── Build one slide ──
    function buildSlide(sd) {
      const slide = document.createElement("div");
      slide.className = `slide theme-${sd.tone}`;
      slide.style.setProperty("--slide-bg", gradientBg(sd.bg));
      slide.style.setProperty("--slide-accent", sd.accent);
      slide.style.setProperty("--slide-accent-2", sd.accent2);
      slide.style.setProperty("--slide-title", sd.tone === "dark" ? "#F7FAFC" : "#1A202C");
      slide.style.setProperty("--slide-muted", sd.tone === "dark" ? "rgba(241,245,249,0.82)" : "rgba(23,34,48,0.74)");

      addDecorations(slide, sd);

      if (sd.accentRule) {
        const rule = document.createElement("div");
        rule.className = "accent-rule";
        rule.style.left  = pctX(L.title.x);
        rule.style.top   = pctY(Math.max(L.title.y - 0.14, 0.12));
        rule.style.width = pctX(Math.min(L.title.w * 0.22, 2.4));
        slide.appendChild(rule);
      }
      if (sd.accentBar) {
        const bar = document.createElement("div");
        bar.className = "accent-bar";
        bar.style.left   = pctX(Math.max(L.title.x - 0.14, 0.1));
        bar.style.top    = pctY(Math.max(L.title.y - 0.02, 0.12));
        bar.style.width  = pctX(0.08);
        bar.style.height = pctY(2.8);
        slide.appendChild(bar);
      }
      if (sd.keyBand) {
        const band = document.createElement("div");
        band.className = "key-band";
        setRect(band, L.desc);
        slide.appendChild(band);
      }

      const title = document.createElement("div");
      title.className = "s-title";
      setRect(title, L.title);
      title.style.fontSize = "18px";
      if (sd.titleFont) title.style.fontFamily = sd.titleFont;
      title.textContent = sd.label;
      slide.appendChild(title);

      const desc = document.createElement("div");
      desc.className = "s-desc";
      setRect(desc, L.desc);
      if (sd.bodyFont) desc.style.fontFamily = sd.bodyFont;
      desc.textContent = sd.desc;
      slide.appendChild(desc);

      makePanel(slide, L.left,  sd, "Signature", sd.char, 0);
      makePanel(slide, L.right, sd, "Best For",  sd.use,  1);

      const notes = document.createElement("div");
      notes.className = "notes-line";
      setRect(notes, L.notes);
      if (sd.bodyFont) notes.style.fontFamily = sd.bodyFont;
      notes.textContent = `fill:${sd.panelFill} · ${sd.tone} · ${sd.bg.join(" → ")}`;
      slide.appendChild(notes);

      return slide;
    }

    // ── All 40 brand styles ──
    const allBrandStyles = [
      // Foundation (2)
      {
        key: "blank white", label: "Blank White", group: "foundation",
        tone: "light", bg: ["#FFFFFF"],
        accent: "#3B82F6", accent2: "#6366F1",
        panelFill: "transparent", panelOpacity: 0.92, panelBorder: false, panelRadius: 18,

    // ── Render ──
    function render() {
      const groups = { foundation: [], named: [], motif: [] };
      allBrandStyles.forEach(s => { if (groups[s.group]) groups[s.group].push(s); });

      [
        { id: "foundationGrid", list: groups.foundation },
        { id: "namedGrid",      list: groups.named      },
        { id: "motifsGrid",     list: groups.motif      },
      ].forEach(({ id, list }) => {
        const grid = document.getElementById(id);
        if (!grid) return;
        list.forEach(sd => {
          const card = document.createElement("article");
          card.className = "style-card";

          const head = document.createElement("div");
          head.className = "card-head";
          const h3 = document.createElement("h3");
          h3.textContent = sd.label;
          const badge = document.createElement("span");
          badge.className = "card-badge";
          badge.textContent = `${sd.panelFill} · ${sd.tone}`;
          head.append(h3, badge);

          const frame = document.createElement("div");
          frame.className = "slide-frame";
          frame.appendChild(buildSlide(sd));

          const key = document.createElement("div");
          key.className = "card-key";
          key.textContent = sd.key;

          card.append(head, frame, key);
          grid.appendChild(card);
        });
      });
    }

    render();
  </script>
