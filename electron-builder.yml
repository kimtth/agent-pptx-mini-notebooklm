directories:
  output: dist
  buildResources: build
appId: com.github.kimtth.pptx-slide-agent
productName: PPTX Slide Agent
executableName: pptxsa
files:
  - filter:
      - out/**/*
      - package.json
extraResources:
  - from: .venv
    to: .venv
  - from: scripts
    to: scripts
  - from: skills
    to: skills
  - from: workflows
    to: workflows
  - from: resources/models
    to: resources/models
asar: true
asarUnpack:
  - node_modules/@github/copilot-*-*/**
win:
  icon: app.ico
  signAndEditExecutable: false
  target:
    - nsis
artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: PPTX Slide Agent
  createDesktopShortcut: true
electronVersion: 41.0.0
